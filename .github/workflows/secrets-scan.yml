name: Secrets Scan

on:
  workflow_call:

jobs:
  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 Install Gitleaks (fixed version)
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_amd64.tar.gz
          tar -xvf gitleaks_linux_amd64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      # 🔹 Verify installation
      - name: Check Gitleaks version
        run: gitleaks version

      # 🔹 Run scan (NO history → important)
      - name: Run Gitleaks scan
        run: |
          gitleaks detect --no-git